<!-- pages/post.php -->
  <div class='post'>
   <div class='postButtons'>
   {{ postbuttons }}
   </div>
   <div class='postHeader'>
   <h1>{{{ title }}}</h1>
   By: {{{ author }}} | <small>Published: <span title='{{ ptime }}'>{{ pdate }}</span></small>{{ edited }}
   {{ icon }}
   <p>
    <div class='tagslabel'>Tags:</div>
    {{ tags }}
   </p>
   </div>
   <div class='postContent'>
   {{{{ content }}}}
   </div>
  </div>
